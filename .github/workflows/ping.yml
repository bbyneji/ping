name: Keep Render Awake & Active

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

permissions:
  contents: write # Allows the action to push the dummy commit

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Recepto API
        run: curl -I -s https://recepto-94x3.onrender.com/healthz

      - name: Prevent 60-Day Suspension (Dummy Commit)
        run: |
          date > last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-run.txt
          git commit -m "Keepalive: $(date)" || exit 0
          git push
