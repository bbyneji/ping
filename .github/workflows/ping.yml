name: Keep Render Awake

on:
  schedule:
    # Runs every 14 minutes, completely free of charge
    - cron: '*/14 * * * *'
  # Allows you to occasionally run it manually from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Recepto API
        run: curl -I -s https://recepto-94x3.onrender.com/healthz
